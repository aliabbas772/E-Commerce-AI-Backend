name: EcommerceAI Backend CI/CD

on:
  push:
    branches: [main]
    paths:
    - 'server/**'
    - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
    - 'server/**'
    - '.github/workflows/backend-ci-cd.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: TypeScript type check
        working-directory: ./server
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: ./server
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_min_32_characters_long
          JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./server
        run: docker build -t ecommerce-server:${{ github.sha }} .

      - name: Build worker Docker image
        working-directory: ./server
        run: docker build -f Dockerfile.worker -t ecommerce-worker:${{ github.sha }} .

